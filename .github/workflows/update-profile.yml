name: Update profile README

# Rigenera lista repository + lista contributor nel profile/README.md.
# Legge i repo dell'org (privati inclusi) tramite il PAT read-only ORG_READONLY_TOKEN;
# il push usa il GITHUB_TOKEN di default (write limitato a questo repo).

on:
  schedule:
    - cron: '17 6 * * *'   # ogni giorno ~06:17 UTC (fuori dal minuto :00)
  workflow_dispatch: {}

concurrency:
  group: update-profile
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verifica secret PAT
        env:
          PAT: ${{ secrets.ORG_READONLY_TOKEN }}
        run: |
          if [ -z "$PAT" ]; then
            echo "::error::Secret ORG_READONLY_TOKEN mancante. Vedi scripts/README.md."
            exit 1
          fi

      - name: Aggiorna lista repository
        env:
          GH_TOKEN: ${{ secrets.ORG_READONLY_TOKEN }}
          ORG: ItalianGres
        run: bash scripts/update-repos.sh

      - name: Aggiorna lista contributor
        env:
          GH_TOKEN: ${{ secrets.ORG_READONLY_TOKEN }}
          ORG: ItalianGres
        run: bash scripts/update-contributors.sh

      - name: Commit & push se cambiato
        run: |
          if git diff --quiet -- profile/README.md; then
            echo "Nessuna modifica al profilo."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/README.md
          git commit -m "chore: aggiorna profilo (repository + contributor)"
          git push
